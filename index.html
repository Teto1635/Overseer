<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Yayın Panosu</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0E0F12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Yayın Panosu" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  :root{
    --bg:#0E0F12; --panel:#16181D; --panel2:#1C1F26; --line:#262932;
    --text:#E6E7EA; --muted:#8A8F98; --faint:#5B606B;
    --amber:#F0B429; --green:#34D399; --red:#F87171; --blue:#5EA0FF;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
  body{padding-bottom:104px;min-height:100vh}
  input,textarea{font-size:16px;font-family:inherit}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  button{font-family:inherit;cursor:pointer}
  .label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);
    padding:calc(14px + env(safe-area-inset-top)) 16px 12px;display:flex;justify-content:space-between;align-items:baseline}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--amber)}
  .h1{font-size:19px;font-weight:800;letter-spacing:-.3px}
  .savedAt{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:right}
  .langtog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .lt{min-width:30px;height:24px;padding:0 7px;background:var(--panel);color:var(--faint);font-size:11px;font-weight:800;font-family:var(--mono);border:none;border-left:1px solid var(--line)}
  .lt:first-child{border-left:none}
  .lt.on{background:rgba(240,180,41,.16);color:var(--amber)}

  /* view tabs */
  .viewtabs{display:flex;gap:6px;padding:12px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .vtab{flex:0 0 auto;min-height:42px;padding:0 16px;border-radius:11px;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);font-weight:700;font-size:13px;white-space:nowrap}
  .vtab.active{border-color:var(--amber);background:rgba(240,180,41,.12);color:var(--amber)}

  .pad{padding:14px 16px 4px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin:0 16px 12px}

  /* stats */
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .grid+.grid{margin-top:8px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .stat.sm{padding:10px 8px}
  .stat .n{font-family:var(--mono);font-weight:800;font-size:30px;line-height:1}
  .stat.sm .n{font-size:22px}
  .stat .t{font-size:11px;color:var(--muted);margin-top:5px}
  .stat.sm .t{font-size:10px}

  /* capacity */
  .caphead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .capset{display:flex;gap:8px}
  .capfield{display:flex;flex-direction:column;align-items:flex-end}
  .capfield span{font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
  .capfield input{width:56px;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:6px 4px}
  .caprow{margin-top:12px}
  .caprow:first-of-type{margin-top:0}
  .capmeta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .capmeta .k{color:var(--muted)}
  .capmeta .v{font-family:var(--mono);font-weight:700}
  .bar{height:8px;border-radius:999px;background:var(--panel2);overflow:hidden}
  .bar>div{height:100%;border-radius:999px;transition:width .25s}
  .note{font-size:11px;color:var(--faint);margin-top:10px;line-height:1.4}

  /* calendar */
  .calgroup{margin-bottom:14px}
  .calgroup:last-child{margin-bottom:0}
  .caltitle{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;gap:8px;align-items:center}
  .calcount{color:var(--faint)}
  .calrow{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);margin-bottom:6px}
  .calrow:last-child{margin-bottom:0}
  .caldate{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:64px}
  .caldate.red{color:var(--red)}
  .calmid{flex:1;min-width:0}
  .calch{font-size:11px;color:var(--faint)}
  .calvid{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .caldot{width:8px;height:8px;border-radius:999px;flex:0 0 auto}
  .calempty{color:var(--faint);font-size:13px;text-align:center;padding:14px 0}

  /* channel tabs + panel */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;padding:10px 14px;border-radius:12px;min-height:44px;border:1px solid var(--line);
    background:var(--panel);color:var(--text);font-weight:700;font-size:14px}
  .tab.active{border-color:var(--amber);background:rgba(240,180,41,.12);color:var(--amber)}
  .tab .c{font-family:var(--mono);font-size:11px;margin-left:8px;color:var(--faint)}
  .tab.active .c{color:var(--amber)}
  .panelwrap{padding:14px 16px 0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
  .chname{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:18px;font-weight:800;padding:2px 0 8px}
  .chmeta{font-family:var(--mono);font-size:11px;color:var(--faint);border-top:1px solid var(--line);padding-top:8px}
  .vids{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .empty{color:var(--faint);font-size:13px;padding:18px 0;text-align:center}
  .secthead{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-top:12px}
  .sectlabel{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .sectcount{font-family:var(--mono);font-size:11px;color:var(--faint);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
  .sectchev{color:var(--muted);font-size:13px;flex:0 0 auto}
  .row{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px}
  .row.overdue{border-color:rgba(248,113,113,.4)}
  .rtop{display:flex;align-items:center;gap:8px}
  .idx{font-family:var(--mono);font-size:12px;color:var(--faint);width:22px}
  .dot{width:8px;height:8px;border-radius:999px;flex:0 0 auto}
  .vtitle{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-weight:600}
  .vtitle.pub{color:var(--muted);text-decoration:line-through}
  .rbot{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
  .statusbtn{min-height:36px;padding:0 12px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid}
  .statusbtn.plan{border-color:var(--amber);background:rgba(240,180,41,.10);color:var(--amber)}
  .statusbtn.pub{border-color:var(--green);background:rgba(52,211,153,.12);color:var(--green)}
  .datein{min-height:36px;padding:0 8px;border-radius:9px;font-family:var(--mono);font-size:13px;border:1px solid var(--line);background:var(--panel);color:var(--text)}
  .datein.overdue{border-color:var(--red);color:var(--red)}
  .actions{margin-left:auto;display:flex;gap:6px}
  .ibtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px}
  .ibtn:disabled{color:var(--faint);opacity:.4}
  .ibtn.danger{color:var(--red)}
  .overtxt{font-family:var(--mono);font-size:11px;color:var(--red);margin-top:7px}
  .badge{min-height:28px;padding:0 9px;border-radius:7px;border:1px solid var(--line);background:var(--panel);font-size:11px;font-weight:700;display:inline-flex;align-items:center;flex:0 0 auto}
  .badge.note{color:var(--blue);border-color:rgba(94,160,255,.45)}
  .badge.link{color:var(--green);border-color:rgba(52,211,153,.45)}
  .chev{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;margin-left:4px;flex:0 0 auto}
  .vdetail{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:none}
  .vdetail.open{display:block}
  .vdetail label{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:5px}
  .vinput{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:9px 10px;margin-bottom:10px}
  .vnote{width:100%;min-height:64px;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:9px 10px;resize:vertical;font-family:inherit;line-height:1.4}
  .vdrow{display:flex;gap:8px;margin-bottom:10px}
  .vbtn{flex:1;min-height:40px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-weight:700;font-size:13px}
  .vbtn.g{border-color:rgba(52,211,153,.5);color:var(--green)}
  .vbtn.b{border-color:rgba(94,160,255,.5);color:var(--blue)}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modalbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:520px;width:100%;max-height:78vh;overflow:auto}
  .modalhead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  .modalhead span{font-weight:800;font-size:16px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .modalhead button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);flex:0 0 auto}
  .modalbody{padding:16px;white-space:pre-wrap;line-height:1.5;color:var(--text);font-size:15px}
  .bulkbtn{width:100%;min-height:42px;border-radius:11px;border:1px solid var(--amber);background:rgba(240,180,41,.10);color:var(--amber);font-weight:700;font-size:13px;margin-top:10px}
  .fld{margin-bottom:14px}
  .fld>label{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:7px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;min-height:42px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-weight:700;font-size:12px}
  .seg button.on{border-color:var(--amber);background:rgba(240,180,41,.14);color:var(--amber)}
  .days{display:flex;gap:5px}
  .day{flex:1;min-width:0;min-height:42px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-weight:700;font-size:12px;padding:0}
  .day.on{border-color:var(--blue);background:rgba(94,160,255,.16);color:var(--blue)}
  .fsel{width:100%;min-height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:0 10px;font-size:15px}
  .fdate{width:100%;min-height:44px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:0 10px;font-family:var(--mono);font-size:14px}
  .frow2{display:flex;gap:10px}
  .frow2>div{flex:1;min-width:0}
  .prev{font-size:13px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:12px;line-height:1.4}
  .prev b{color:var(--amber);font-family:var(--mono)}
  .applybtn{width:100%;min-height:48px;border-radius:12px;border:none;background:var(--amber);color:#1A1400;font-weight:800;font-size:15px}
  .colorrow{display:flex;align-items:center;gap:10px}
  .colordot{width:26px;height:26px;border-radius:999px;flex:0 0 auto;border:2px solid rgba(255,255,255,.18);padding:0}
  .swatches{display:flex;flex-wrap:wrap;gap:14px;padding:6px;justify-content:center}
  .swatch{width:48px;height:48px;border-radius:999px;border:3px solid transparent;padding:0}
  .swatch.on{border-color:#fff}
  .tabdot{width:9px;height:9px;border-radius:999px;display:inline-block;margin-right:7px;vertical-align:middle}
  .chdot{width:7px;height:7px;border-radius:999px;display:inline-block;margin-right:6px;vertical-align:middle}
  .brkrow{display:flex;flex-direction:column;gap:5px;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);margin-bottom:8px}
  .brkrow:last-child{margin-bottom:0}
  .brktop{display:flex;align-items:center;gap:9px}
  .brkdot{width:10px;height:10px;border-radius:999px;flex:0 0 auto}
  .brkname{font-weight:700;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brknext{font-family:var(--mono);font-size:11px;color:var(--muted);flex:0 0 auto}
  .brkstats{font-family:var(--mono);font-size:12px;color:var(--muted);padding-left:19px}
  .brkstats .od{color:var(--red)}
  .temposum{font-size:13px;color:var(--muted);margin-bottom:12px}
  .temposum b{color:var(--green);font-family:var(--mono)}
  .tempobars{display:flex;align-items:flex-end;gap:6px;height:92px}
  .tcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
  .tcount{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:3px;line-height:1}
  .tbar{width:100%;background:var(--green);border-radius:5px 5px 0 0;min-height:3px}
  .tbar.zero{background:var(--line)}
  .tlabels{display:flex;gap:6px;margin-top:6px}
  .tlab{flex:1;text-align:center;font-family:var(--mono);font-size:9px;color:var(--faint)}
  .iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .drag{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--faint);font-size:16px;touch-action:none}
  .row.dragging{opacity:.96;box-shadow:0 10px 26px rgba(0,0,0,.55);border-color:var(--amber)}
  .sres{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);margin-bottom:6px}
  .srest{font-family:var(--mono);font-size:11px;flex:0 0 auto}
  .cloudlbl{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:6px}
  .badge.chk{font-family:var(--mono)}
  .chkrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chk{min-height:38px;padding:0 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;font-weight:700}
  .chk.on{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.12);color:var(--green)}
  .calnav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;gap:10px}
  .calmonth{font-size:17px;font-weight:800}
  .navbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:18px;flex:0 0 auto}
  .todaybtn{margin:0 16px 8px;min-height:36px;padding:0 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:12px;font-weight:700}
  .calgridhead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px}
  .wkh{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);padding:4px 0}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:4px 12px}
  .celld{min-height:54px;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:4px;display:flex;flex-direction:column;gap:3px}
  .celld.blank{background:transparent;border-color:transparent}
  .celld.istoday{border-color:var(--amber)}
  .celld.has{cursor:pointer}
  .daynum{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .celld.istoday .daynum{color:var(--amber);font-weight:700}
  .daydots{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
  .ddot{width:8px;height:8px;border-radius:999px;flex:0 0 auto}
  .ddot.pub{opacity:.4}
  .dmore{font-family:var(--mono);font-size:9px;color:var(--faint)}
  .callegend{display:flex;flex-wrap:wrap;gap:10px 14px;padding:14px 16px 4px}
  .legitem{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .ideacard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .irow1{display:flex;align-items:center;gap:8px}
  .istar{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--faint);font-size:16px;flex:0 0 auto}
  .istar.on{color:var(--amber);border-color:rgba(240,180,41,.5)}
  .ititle{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-weight:700}
  .inote{width:100%;min-height:52px;margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:9px 10px;resize:vertical;font-family:inherit;line-height:1.4;font-size:14px}
  .irow3{display:flex;gap:8px;margin-top:10px}
  .irow3 .fsel{flex:1}
  .convbtn{flex:0 0 auto;min-height:44px;padding:0 14px;border-radius:9px;border:1px solid var(--amber);background:rgba(240,180,41,.10);color:var(--amber);font-weight:700;font-size:13px}
  .ibadges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .ibadge{min-height:32px;padding:0 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);font-size:15px;line-height:1;display:inline-flex;align-items:center;flex:0 0 auto}
  .ibadge.lk{border-color:rgba(52,211,153,.45)}
  .ibadge.nt{border-color:rgba(94,160,255,.45)}
  .ibadge.im{border-color:rgba(167,139,250,.5)}
  .iimgrow{display:flex;gap:8px;margin-top:0}
  .iimgrow .vbtn{flex:1}
  .ithumb{margin-top:10px;max-width:100%;max-height:180px;border-radius:10px;border:1px solid var(--line);display:block;object-fit:contain;background:var(--panel2)}
  .imgov{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;touch-action:none;overscroll-behavior:contain}
  .imgstage{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
  .imgz{max-width:100%;max-height:100%;transform-origin:center center;will-change:transform;-webkit-user-select:none;user-select:none;-webkit-user-drag:none}
  .imgclose{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);right:14px;width:42px;height:42px;border-radius:999px;border:1px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);color:#fff;font-size:18px;z-index:81}
  .imgnav{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:64px;border-radius:12px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.45);color:#fff;font-size:26px;z-index:81;display:flex;align-items:center;justify-content:center}
  .imgnav.prev{left:10px}.imgnav.next{right:10px}
  .imgcount{position:fixed;top:calc(env(safe-area-inset-top,0px) + 16px);left:0;right:0;text-align:center;color:#fff;font-family:var(--mono);font-size:13px;z-index:81;pointer-events:none}
  .ifilter{display:flex;gap:8px;align-items:center}

const toYMD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

function weekRange(){const d=new Date();const day=(d.getDay()+6)%7;const s=new Date(d);s.setDate(d.getDate()-day);const e=new Date(s);e.setDate(s.getDate()+6);return[toYMD(s),toYMD(e)];}
function monthRange(){const d=new Date();return[toYMD(new Date(d.getFullYear(),d.getMonth(),1)),toYMD(new Date(d.getFullYear(),d.getMonth()+1,0))];}
function daysInMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}
const fmtDate = ymd => {if(!ymd)return"—";const[y,m,dd]=ymd.split("-");return `${dd}.${m}.${y.slice(2)}`;};

const cssVar=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();

// ---- workload ----
function workload(){
  const today=todayStr();const[wkS,wkE]=weekRange();const[moS,moE]=monthRange();
  let daily=0,weekly=0,monthly=0,overdue=0,planned=0,published=0;
  for(const ch of state.channels)for(const v of ch.videos){
    if(v.status==="published"){published++;continue;}
    planned++;
    if(!v.date)continue;
    if(v.date===today)daily++;
    if(v.date>=wkS&&v.date<=wkE)weekly++;
    if(v.date>=moS&&v.date<=moE)monthly++;
    if(v.date<today)overdue++;
  }
  return{daily,weekly,monthly,overdue,planned,published};
}

    if(v.date) dated.push({ci,ch:c.name,title:v.title,date:v.date});

function studioUrl(link){
  if(!link)return null;link=link.trim();if(!link)return null;
  if(/studio\.youtube\.com/.test(link))return link;
  const m=link.match(/[?&]v=([\w-]{11})/)||link.match(/youtu\.be\/([\w-]{11})/)||link.match(/shorts\/([\w-]{11})/)||link.match(/\/video\/([\w-]{11})/)||link.match(/\/live\/([\w-]{11})/);
  if(m)return "https://studio.youtube.com/video/"+m[1]+"/edit";
  if(/^[\w-]{11}$/.test(link))return "https://studio.youtube.com/video/"+link+"/edit";
  return link;
}

// ---- auto date distribution ----
function autoDateCompute(cfg){
  const ch=state.channels[cfg.ci];
  const planned=ch.videos.map((v,i)=>({v,i})).filter(o=>o.v.status!=="published");
  let targets;
  if(cfg.pattern==="odd") targets=planned.filter((o,k)=>k%2===0);
  else if(cfg.pattern==="even") targets=planned.filter((o,k)=>k%2===1);
  else targets=planned;
  const occ=[];
  if(cfg.start&&cfg.end&&cfg.days.size){
    const[sy,sm,sd]=cfg.start.split("-").map(Number);
    const[ey,em,ed]=cfg.end.split("-").map(Number);
    let cur=new Date(sy,sm-1,sd);const end=new Date(ey,em-1,ed);let guard=0;
    while(cur<=end&&guard<3000){if(cfg.days.has(cur.getDay()))occ.push(toYMD(cur));cur.setDate(cur.getDate()+1);guard++;}
  }
  return {targets,occ,assignCount:Math.min(targets.length,occ.length)};
}
function autoDateApply(cfg){
  const r=autoDateCompute(cfg);
  if(r.assignCount===0){flash(t("bulkNothing"),true);return;}
  if(!confirm(r.assignCount+" "+t("bulkConfirm")))return;
  const ch=state.channels[cfg.ci];
  for(let k=0;k<r.assignCount;k++) ch.videos[r.targets[k].i].date=r.occ[k];
  activeCh=cfg.ci;collapsed.planned=false;
  closeModal();renderTabs();renderPanel();refreshOverview();save(true);
  flash(r.assignCount+" "+t("bulkDone"));
}

// ---- drag reorder (planned) ----
function reorderPlanned(ch,fromPos,toPos){
  const slots=[];ch.videos.forEach((v,i)=>{if(v.status!=="published")slots.push(i);});
  if(fromPos<0||fromPos>=slots.length)return;
  toPos=Math.max(0,Math.min(slots.length-1,toPos));
  if(fromPos===toPos)return;
  const order=slots.map(i=>ch.videos[i]);
  const moved=order.splice(fromPos,1)[0];
  order.splice(toPos,0,moved);
  slots.forEach((arrIdx,k)=>{ch.videos[arrIdx]=order[k];});
}
let drag=null;
function startDrag(e,row,ch,fromPos){
  e.preventDefault();
  const siblings=[...row.parentNode.children].filter(el=>el.classList.contains("row"));
  drag={row,ch,fromPos,rects:siblings.map(el=>el.getBoundingClientRect()),startY:e.clientY};
  row.classList.add("dragging");
  try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
}
function moveDrag(e){if(!drag)return;e.preventDefault();drag.row.style.transform="translateY("+(e.clientY-drag.startY)+"px)";drag.row.style.zIndex="5";}
function endDrag(e){
  if(!drag)return;
  const y=(e&&e.clientY!=null)?e.clientY:drag.startY;
  let t=0;drag.rects.forEach(r=>{if(y>r.top+r.height/2)t++;});
  let toPos=t;if(toPos>drag.fromPos)toPos--;
  const ch=drag.ch,from=drag.fromPos;
  drag.row.style.transform="";drag.row.style.zIndex="";drag.row.classList.remove("dragging");
  drag=null;
  reorderPlanned(ch,from,toPos);renderPanel();refreshOverview();autosave();
}

function renderTempo(){
  const card=document.getElementById("tempoCard");if(!card)return;card.innerHTML="";
  const dates=[];
  state.channels.forEach(c=>c.videos.forEach(v=>{if(v.status==="published"){const d=effPubDate(v);if(d)dates.push(d);}}));
  const now=new Date();const day=(now.getDay()+6)%7;const curMon=new Date(now);curMon.setDate(now.getDate()-day);
  const buckets=[];
  for(let i=7;i>=0;i--){const s=new Date(curMon);s.setDate(curMon.getDate()-i*7);const e=new Date(s);e.setDate(s.getDate()+6);buckets.push({s:toYMD(s),e:toYMD(e),label:s.getDate()+"/"+(s.getMonth()+1),count:0});}
  dates.forEach(d=>{for(const b of buckets){if(d>=b.s&&d<=b.e){b.count++;break;}}});
  const max=Math.max(1,...buckets.map(b=>b.count));
  const[wkS,wkE]=weekRange();const[moS,moE]=monthRange();
  let wk=0,mo=0;dates.forEach(d=>{if(d>=wkS&&d<=wkE)wk++;if(d>=moS&&d<=moE)mo++;});

  const sum=document.createElement("div");sum.className="temposum";
  sum.innerHTML=t("tempoWeek")+" <b>"+wk+"</b> · "+t("tempoMonth")+" <b>"+mo+"</b> · "+t("tempoTotal")+" <b>"+dates.length+"</b> "+t("tempoPub");
  card.appendChild(sum);

  const bars=document.createElement("div");bars.className="tempobars";
  buckets.forEach(b=>{
    const col=document.createElement("div");col.className="tcol";
    const c=document.createElement("div");c.className="tcount";c.textContent=b.count;
    const bar=document.createElement("div");bar.className="tbar"+(b.count===0?" zero":"");
    bar.style.height=(b.count>0?Math.max(4,Math.round(b.count/max*70)):3)+"px";
    col.appendChild(c);col.appendChild(bar);bars.appendChild(col);
  });
  card.appendChild(bars);
  const labs=document.createElement("div");labs.className="tlabels";
  buckets.forEach(b=>{const l=document.createElement("div");l.className="tlab";l.textContent=b.label;labs.appendChild(l);});
  card.appendChild(labs);

  if(dates.length===0){const e=document.createElement("div");e.className="note";e.style.marginTop="10px";e.textContent=t("tempoEmpty");card.appendChild(e);}
}

function compressImage(file,ok,fail){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      try{
        let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;const MAX=1280;
        if(w>=h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>w&&h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        let q=0.72,out=c.toDataURL("image/jpeg",q);
        while(out.length>820000&&q>0.4){q-=0.1;out=c.toDataURL("image/jpeg",q);}
        ok(out);
      }catch(e){fail();}
    };
    img.onerror=()=>fail();
    img.src=reader.result;
  };
  reader.onerror=()=>fail();
  reader.readAsDataURL(file);
}
function openImageViewer(images,startIndex){
  let imgs=Array.isArray(images)?images.filter(Boolean):(images?[images]:[]);
  if(!imgs.length)return;
  let idx=Math.min(Math.max(startIndex||0,0),imgs.length-1);
  const ov=document.createElement("div");ov.className="imgov";
  const stage=document.createElement("div");stage.className="imgstage";
  const img=document.createElement("img");img.className="imgz";img.draggable=false;
  stage.appendChild(img);
  const close=document.createElement("button");close.className="imgclose";close.textContent="✕";
  const counter=document.createElement("div");counter.className="imgcount";
  const prev=document.createElement("button");prev.className="imgnav prev";prev.textContent="‹";
  const next=document.createElement("button");next.className="imgnav next";next.textContent="›";
  ov.appendChild(stage);ov.appendChild(close);ov.appendChild(counter);ov.appendChild(prev);ov.appendChild(next);
  document.body.appendChild(ov);
  let scale=1,tx=0,ty=0,start=null,lastTap=0;
  const apply=()=>{img.style.transform="translate("+tx+"px,"+ty+"px) scale("+scale+")";};
  const show=()=>{img.src=imgs[idx];scale=1;tx=0;ty=0;apply();counter.textContent=imgs.length>1?((idx+1)+"/"+imgs.length):"";const multi=imgs.length>1;prev.style.display=multi?"flex":"none";next.style.display=multi?"flex":"none";};
  const go=(d)=>{idx=(idx+d+imgs.length)%imgs.length;show();};
  prev.onclick=(e)=>{e.stopPropagation();go(-1);};
  next.onclick=(e)=>{e.stopPropagation();go(1);};
  const dist=(a,b)=>Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
  const mid=(a,b)=>({x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2});
  stage.addEventListener("touchstart",e=>{
    if(e.touches.length===2){e.preventDefault();start={mode:"pinch",d:dist(e.touches[0],e.touches[1]),s:scale,m:mid(e.touches[0],e.touches[1]),tx:tx,ty:ty};}
    else if(e.touches.length===1){start={mode:scale>1?"pan":"swipe",x:e.touches[0].clientX,y:e.touches[0].clientY,tx:tx,ty:ty,moved:0};}
  },{passive:false});
  stage.addEventListener("touchmove",e=>{
    if(!start)return;
    if(start.mode==="pinch"&&e.touches.length===2){e.preventDefault();const d=dist(e.touches[0],e.touches[1]);const m=mid(e.touches[0],e.touches[1]);scale=Math.min(Math.max(start.s*(d/start.d),1),6);tx=start.tx+(m.x-start.m.x);ty=start.ty+(m.y-start.m.y);apply();}
    else if(start.mode==="pan"&&e.touches.length===1){e.preventDefault();tx=start.tx+(e.touches[0].clientX-start.x);ty=start.ty+(e.touches[0].clientY-start.y);apply();}
    else if(start.mode==="swipe"&&e.touches.length===1){start.moved=e.touches[0].clientX-start.x;}
  },{passive:false});
  stage.addEventListener("touchend",e=>{
    const now=Date.now();
    if(e.changedTouches.length&&now-lastTap<300&&(start===null||start.mode!=="pinch")){if(scale>1){scale=1;tx=0;ty=0;apply();}else{scale=2.5;apply();}lastTap=now;start=null;return;}
    lastTap=now;
    if(start&&start.mode==="swipe"&&Math.abs(start.moved)>60&&imgs.length>1){go(start.moved<0?1:-1);}
    if(e.touches.length===0){if(scale<=1){scale=1;tx=0;ty=0;apply();}start=null;}
    else if(e.touches.length===1){start={mode:scale>1?"pan":"swipe",x:e.touches[0].clientX,y:e.touches[0].clientY,tx:tx,ty:ty,moved:0};}
  });
  stage.addEventListener("wheel",e=>{e.preventDefault();scale=Math.min(Math.max(scale*(e.deltaY<0?1.1:0.9),1),6);if(scale===1){tx=0;ty=0;}apply();},{passive:false});
  const closeFn=()=>{ov.remove();document.removeEventListener("keydown",onKey);};
  const onKey=(e)=>{if(e.key==="Escape")closeFn();else if(e.key==="ArrowRight")go(1);else if(e.key==="ArrowLeft")go(-1);};
  document.addEventListener("keydown",onKey);
  close.onclick=closeFn;
  ov.addEventListener("click",e=>{if(e.target===ov)closeFn();});
  show();
}

const FB_VER="10.12.5";
function genCode(){const a="abcdefghijkmnpqrstuvwxyz23456789";let s="";for(let i=0;i<24;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
function cloudStatus(msg,err){cloud.statusMsg=msg;cloud.statusErr=!!err;renderCloud();}
async function connectCloud(){
  const cfgRaw=localStorage.getItem("cloudConfig"),code=localStorage.getItem("boardCode");
  if(!cfgRaw||!code)return;
  let config;try{config=JSON.parse(cfgRaw);}catch(e){cloudStatus(t("clBadConfig"),true);return;}
  cloudStatus(t("clConnecting"),false);
  try{
    const appMod=await import("https://www.gstatic.com/firebasejs/"+FB_VER+"/firebase-app.js");
    const fsMod=await import("https://www.gstatic.com/firebasejs/"+FB_VER+"/firebase-firestore.js");
    const app=(appMod.getApps&&appMod.getApps().length)?appMod.getApp():appMod.initializeApp(config);
    let db;
    try{db=fsMod.initializeFirestore(app,{localCache:fsMod.persistentLocalCache({tabManager:fsMod.persistentSingleTabManager()})});}
    catch(e){db=fsMod.getFirestore(app);}
    cloud.on=true;cloud.db=db;cloud.fs=fsMod;cloud.code=code;
    const ref=fsMod.doc(db,"boards",code);
    cloud.unsub=fsMod.onSnapshot(ref,(snap)=>{
      if(snap.metadata&&snap.metadata.hasPendingWrites)return;
      if(!snap.exists()){pushCloud();cloudStatus(t("clNewBoard"),false);return;}
      const d=snap.data();if(d&&d.stateJson)applyRemote(d.stateJson);
      cloudStatus(t("clSync"),false);
    },(err)=>{cloudStatus(t("clErr")+" "+((err&&err.code)||t("clConnErr")),true);});
    cloudStatus(t("clConnected"),false);
  }catch(e){cloud.on=false;cloudStatus(t("clLoadFail"),true);}
}
function applyRemote(stateJson){
  let inc;try{inc=migrate(JSON.parse(stateJson));}catch(e){return;}
  const ae=document.activeElement;
  if(ae&&(ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")){pendingRemote=stateJson;return;}
  state=inc;if(activeCh>=state.channels.length)activeCh=0;
  try{localStorage.setItem(KEY,JSON.stringify({state,savedAt:Date.now()}));}catch(e){}
  renderAll();
}
async function pushCloud(){
  if(!cloud.on||!cloud.db||!cloud.fs)return;
  const json=JSON.stringify(state);
  if(json.length>1000000){cloudStatus(t("clTooBig"),true);return;}
  try{const ref=cloud.fs.doc(cloud.db,"boards",cloud.code);await cloud.fs.setDoc(ref,{stateJson:json,savedAt:Date.now()});}
  catch(e){cloudStatus(t("clWriteErr"),true);}
}
function extractConfigObject(text){
  const s=text||"";
  const fc=s.indexOf("firebaseConfig");
  let start=(fc>=0)?s.indexOf("{",fc):s.indexOf("{");
  if(start<0)return null;
  let depth=0,end=-1;
  for(let i=start;i<s.length;i++){if(s[i]==="{")depth++;else if(s[i]==="}"){depth--;if(depth===0){end=i;break;}}}
  if(end<0)return null;
  return s.slice(start,end+1);
}
function parseConfig(text){
  const obj=extractConfigObject(text);if(!obj)return null;
  try{return JSON.parse(obj);}catch(e){}
  try{return (new Function("return ("+obj+")"))();}catch(e){}
  return null;
}
function cloudSetup(configText,codeText){
  const config=parseConfig(configText);
  if(!config||!config.projectId||!config.apiKey){flash(t("clCfgUnread"),true);return;}
  const code=(codeText&&codeText.trim())?codeText.trim().replace(/\s/g,""):genCode();
  localStorage.setItem("cloudConfig",JSON.stringify(config));
  localStorage.setItem("boardCode",code);
  closeModal();connectCloud();
}
function cloudJoin(str){
  try{const o=JSON.parse(decodeURIComponent(escape(atob(str.trim()))));if(!o.c||!o.k)throw 0;
    localStorage.setItem("cloudConfig",JSON.stringify(o.c));localStorage.setItem("boardCode",o.k);
    closeModal();connectCloud();
  }catch(e){flash(t("clBadInvite"),true);}
}
function cloudShare(){
  const cfg=localStorage.getItem("cloudConfig"),code=localStorage.getItem("boardCode");
  if(!cfg||!code){flash(t("clConnectFirst"),true);return;}
  const str=btoa(unescape(encodeURIComponent(JSON.stringify({c:JSON.parse(cfg),k:code}))));

  else flash(t("clCopyFail"),true);
}
function cloudDisconnect(){

  try{if(cloud.unsub)cloud.unsub();}catch(e){}
  cloud={on:false,db:null,fs:null,code:null,unsub:null,statusMsg:"",statusErr:false};

function renderCloud(){
  const card=document.getElementById("cloudCard");if(!card)return;card.innerHTML="";
  const connected=!!localStorage.getItem("boardCode");
  const st=document.createElement("div");st.className="temposum";st.style.marginBottom="10px";
  if(connected){
    const code=localStorage.getItem("boardCode")||"";
    const msg=cloud.statusMsg||(cloud.on?t("clConnected"):t("clConnecting"));
    st.innerHTML=t("clStatus")+" <b style=\"color:"+(cloud.statusErr?"var(--red)":"var(--green)")+"\">"+msg+"</b> · "+t("clCode")+" …"+code.slice(-6);
  }else st.innerHTML=t("clStatus")+" <b>"+t("clLocal")+"</b> "+t("clLocalTail");
  card.appendChild(st);
  const btns=document.createElement("div");btns.className="bkbtns";
  if(connected){
    const share=document.createElement("button");share.className="bk amber";share.textContent=t("clShare");share.onclick=cloudShare;
    const dis=document.createElement("button");dis.className="bk";dis.textContent=t("clDisconnect");dis.onclick=cloudDisconnect;
    btns.appendChild(share);btns.appendChild(dis);
  }else{
    const conn=document.createElement("button");conn.className="bk amber";conn.textContent=t("clConnect");conn.onclick=openCloudModal;
    btns.appendChild(conn);
  }
  card.appendChild(btns);
  const note=document.createElement("div");note.className="note";
  note.textContent=connected?t("clNoteOn"):t("clNoteOff");
  card.appendChild(note);
}
function openCloudModal(){
  const wrap=document.createElement("div");
  const steps=document.createElement("div");steps.className="note";steps.style.cssText="margin-bottom:14px;line-height:1.5";
  steps.innerHTML=t("clSteps");
  wrap.appendChild(steps);
  const l1=document.createElement("label");l1.textContent=t("clCfgLabel");l1.className="cloudlbl";
  const cfg=document.createElement("textarea");cfg.className="vnote";cfg.placeholder=t("clCfgPlaceholder");cfg.style.minHeight="92px";
  const codeIn=document.createElement("input");codeIn.className="vinput";codeIn.placeholder=t("clCodePlaceholder");codeIn.style.marginTop="10px";
  const connBtn=document.createElement("button");connBtn.className="applybtn";connBtn.style.marginTop="6px";connBtn.textContent=t("clConnGen");connBtn.onclick=()=>cloudSetup(cfg.value,codeIn.value);
  wrap.appendChild(l1);wrap.appendChild(cfg);wrap.appendChild(codeIn);wrap.appendChild(connBtn);
  const dv=document.createElement("div");dv.style.cssText="text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px;margin:16px 0";dv.textContent=t("clOr");wrap.appendChild(dv);
  const l2=document.createElement("label");l2.textContent=t("clJoinLabel");l2.className="cloudlbl";
  const joinIn=document.createElement("textarea");joinIn.className="vnote";joinIn.placeholder=t("clJoinPlaceholder");joinIn.style.minHeight="70px";
  const joinBtn=document.createElement("button");joinBtn.className="bk amber";joinBtn.style.cssText="width:100%;margin-top:6px;min-height:46px";joinBtn.textContent=t("clJoin");joinBtn.onclick=()=>cloudJoin(joinIn.value);
  wrap.appendChild(l2);wrap.appendChild(joinIn);wrap.appendChild(joinBtn);
  openModalNode(t("clModalTitle"),wrap);
}

document.getElementById("vtabChannels").onclick=()=>setView("channels");
document.getElementById("vtabCalendar").onclick=()=>setView("calendar");
document.getElementById("vtabIdeas").onclick=()=>setView("ideas");
document.getElementById("saveBtn").onclick=()=>save(false);
document.getElementById("modalClose").onclick=closeModal;
document.getElementById("modal").onclick=(e)=>{if(e.target.id==="modal")closeModal();};
(function(){const sb=document.getElementById("searchBtn");sb.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>';sb.onclick=openSearchModal;})();

function handleShareTarget(){
  try{
    const sp=new URLSearchParams(location.search);
    if(!(sp.has("url")||sp.has("text")||sp.has("title")))return;
    const url=(sp.get("url")||"").trim(),text=(sp.get("text")||""),ttl=(sp.get("title")||"").trim();
    const link=url||(/^https?:\/\//i.test(text.trim())?text.trim():"");
    const note=(link&&link===text.trim())?"":text;
    const nid=uid();
    state.ideas.unshift({id:nid,title:ttl||"",note:note||"",link:link||"",imgs:[],tags:[],star:false,createdAt:Date.now()});
    expandedIds.add(nid);save(true);renderIdeas();setView("ideas");
    history.replaceState({},"",location.pathname);
  }catch(e){}
}
document.getElementById("langTR").onclick=()=>setLang("tr");
document.getElementById("langEN").onclick=()=>setLang("en");
updateLangBtn();
applyI18n();
renderAll();
handleShareTarget();
if(localStorage.getItem("cloudConfig")&&localStorage.getItem("boardCode"))connectCloud();
document.addEventListener("focusout",()=>{if(pendingRemote){setTimeout(()=>{const ae=document.activeElement;if(!ae||(ae.tagName!=="INPUT"&&ae.tagName!=="TEXTAREA")){const p=pendingRemote;pendingRemote=null;applyRemote(p);}},50);}});

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
